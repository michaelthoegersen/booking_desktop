<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Møtesvar - Complete Drums</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #fff; border-radius: 16px; max-width: 460px; width: 100%; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .header { background: #1a1a1a; padding: 24px 28px; }
    .header h1 { color: #fff; font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
    .content { padding: 28px; }
    .spinner { text-align: center; padding: 40px 0; }
    .spinner-ring { display: inline-block; width: 40px; height: 40px; border: 4px solid #e5e5e5; border-top-color: #333; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner p { margin-top: 16px; font-size: 15px; color: #666; }
    .status-badge { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 10px; font-size: 18px; font-weight: 700; margin-bottom: 24px; }
    .status-yes { background: #f0fdf4; color: #16a34a; }
    .status-no { background: #fef2f2; color: #dc2626; }
    .meeting-card { background: #f8f8f8; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #eee; }
    .meeting-card h2 { font-size: 17px; color: #111; margin-bottom: 12px; }
    .detail { display: flex; gap: 10px; font-size: 14px; color: #555; padding: 4px 0; }
    .detail .label { font-weight: 600; color: #333; min-width: 50px; }
    .greeting { font-size: 15px; color: #555; margin-bottom: 8px; }
    .message { font-size: 15px; color: #333; margin-bottom: 20px; line-height: 1.5; }
    .change-link { display: block; text-align: center; margin-top: 16px; padding: 12px; font-size: 13px; color: #888; text-decoration: none; border: 1px solid #e5e5e5; border-radius: 8px; transition: all 0.15s; cursor: pointer; }
    .change-link:hover { background: #f8f8f8; color: #555; border-color: #ccc; }
    .footer { padding: 16px 28px; background: #fafafa; border-top: 1px solid #eee; text-align: center; }
    .footer p { font-size: 12px; color: #999; }
    .footer strong { color: #333; }
    .error-icon { font-size: 48px; text-align: center; margin-bottom: 16px; }
    .error-title { font-size: 20px; color: #333; margin-bottom: 12px; text-align: center; }
    .error-msg { font-size: 15px; color: #666; text-align: center; line-height: 1.5; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>COMPLETE DRUMS</h1>
    </div>
    <div class="content">
      <!-- Loading state -->
      <div id="loading" class="spinner">
        <div class="spinner-ring"></div>
        <p>Registrerer svaret ditt...</p>
      </div>

      <!-- Success state -->
      <div id="success" class="hidden">
        <p id="greeting" class="greeting"></p>
        <p class="message">Ditt svar er registrert:</p>
        <div id="status-badge" class="status-badge"></div>
        <div id="meeting-info" class="meeting-card"></div>
        <a id="change-link" class="change-link"></a>
      </div>

      <!-- Error state -->
      <div id="error" class="hidden">
        <div class="error-icon">&#9888;&#65039;</div>
        <h2 class="error-title">Noe gikk galt</h2>
        <p id="error-msg" class="error-msg"></p>
      </div>
    </div>
    <div class="footer">
      <p>Sendt fra <strong>Complete Drums</strong> via TourFlow</p>
    </div>
  </div>

  <script>
    const BASE = 'https://fqefvgqlrntwgschkugf.supabase.co/functions/v1/meeting-rsvp';

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const meetingId = params.get('meeting_id');
      const userId = params.get('user_id');
      const response = params.get('response');

      if (!meetingId || !userId || !response) {
        showError('Ugyldig lenke. Mangler parametere.');
        return;
      }

      try {
        const res = await fetch(
          BASE + '?meeting_id=' + encodeURIComponent(meetingId) +
          '&user_id=' + encodeURIComponent(userId) +
          '&response=' + encodeURIComponent(response)
        );

        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Kunne ikke registrere svaret.');
          return;
        }

        showSuccess(data, meetingId, userId, response);
      } catch (e) {
        showError('En uventet feil oppstod. Prøv igjen senere.');
      }
    }

    function showSuccess(data, meetingId, userId, response) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('success').classList.remove('hidden');

      const isYes = response === 'attending';
      const name = data.user_name || '';
      const title = data.title || 'Møte';
      const date = data.date || '';
      const time = data.start_time || '';
      const city = data.city || '';

      if (name) {
        document.getElementById('greeting').textContent = 'Hei ' + name + ',';
      }

      const badge = document.getElementById('status-badge');
      badge.className = 'status-badge ' + (isYes ? 'status-yes' : 'status-no');
      badge.textContent = isYes ? '\u2705 Kommer' : '\u274C Kommer ikke';

      let infoHtml = '<h2>' + esc(title) + '</h2>';
      if (date) {
        const d = new Date(date);
        const formatted = d.toLocaleDateString('nb-NO', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        infoHtml += '<div class="detail"><span class="label">Dato</span><span>' + esc(formatted) + '</span></div>';
      }
      if (time) infoHtml += '<div class="detail"><span class="label">Tid</span><span>' + esc(time) + '</span></div>';
      if (city) infoHtml += '<div class="detail"><span class="label">Sted</span><span>' + esc(city) + '</span></div>';
      document.getElementById('meeting-info').innerHTML = infoHtml;

      const other = isYes ? 'not_attending' : 'attending';
      const changeLink = document.getElementById('change-link');
      changeLink.textContent = (isYes ? 'Kan likevel ikke?' : 'Ombestemt deg?') + ' Klikk her for å endre svaret ditt.';
      changeLink.href = window.location.pathname + '?meeting_id=' + meetingId + '&user_id=' + userId + '&response=' + other;
    }

    function showError(msg) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error-msg').textContent = msg;
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    init();
  </script>
</body>
</html>
