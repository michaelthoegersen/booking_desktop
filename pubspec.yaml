name: tourflow
description: TourFlow booking and tour management system
publish_to: 'none'

version: 1.1.1+7

environment:
  sdk: ">=3.0.0 <4.0.0"

# =============================================================
# DEPENDENCIES
# =============================================================

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  go_router: ^14.6.2
  supabase_flutter: ^2.8.0
  flutter_dotenv: ^5.1.0

  shared_preferences: ^2.3.2
  cupertino_icons: ^1.0.8

  pdf: ^3.11.0
  printing: ^5.13.0
  intl: ^0.20.2

  flutter_polyline_points: ^2.0.0
  http: ^1.2.0
  webview_flutter: ^4.7.0
  file_picker: ^10.0.0

  syncfusion_flutter_pdf: ^24.1.41

  open_filex: ^4.3.2
  path_provider: ^2.1.2
  url_launcher: ^6.2.5
  crypto: ^3.0.0
  just_audio: ^0.9.0
  flutter_svg: ^2.2.3
  web: ^1.1.1
  agora_rtc_engine: ^6.5.3
  mailer: ^7.1.0
  flutter_markdown: ^0.7.7+1


# =============================================================
# DEV DEPENDENCIES
# =============================================================

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.13.1


# =============================================================
# APP ICON CONFIG (ALL PLATFORMS)
# =============================================================

flutter_icons:

  # MASTER ICON
  image_path: "assets/icon/TourFlowIcon.png"

  android:
    generate: true

  ios:
    generate: true
  remove_alpha_ios: true

  macos:
    generate: true

  windows:
    generate: true


# =============================================================
# FLUTTER CONFIG
# =============================================================

flutter:
  uses-material-design: true

  assets:
    - .env

    # Portal logos
    - assets/TourFlowLogin.png
    - assets/LogoTourFlowArtist.png
    - assets/LogoTourFlowArtist.svg
    - assets/TourFlowLogoManagement.png
    - assets/TourFlowLogoFront.png
    - assets/TourFlowLogoFront.svg
    - assets/ManagementTourFlow.svg

    # PDF logos
    - assets/pdf/logos/CSSLogo.png
    - assets/pdf/logos/Starcoachlogo.png
    - assets/pdf/logos/LOGOapp.png
    - assets/pdf/logos/TourFlowLogo.png
    - assets/pdf/logos/TourFlowLogo.svg
    - assets/pdf/logos/TourFlowLogoComplete.png
    - assets/pdf/logos/TourFlowLogoComplete.svg
    - assets/pdf/logos/CompleteDrumsWhite.png

    # Bus images
    - assets/pdf/buses/12_sleeper.png
    - assets/pdf/buses/14_sleeper.png
    - assets/pdf/buses/16_sleeper.png
    - assets/pdf/buses/18_sleeper.png
    - assets/pdf/buses/DDBus.png
    - assets/pdf/buses/DDBuskart.png

    # Templates
    - assets/pdf/template_page0.png

    # Fonts
    - assets/fonts/calibri.ttf
    - assets/fonts/calibrib.ttf
    - assets/fonts/Roboto-Regular.ttf
    - assets/fonts/Roboto-Bold.ttf